<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - Babyraj Foundation</title>
    <link rel="stylesheet" href="css/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Gallery Layout */
        .gallery-container {
            max-width: 1200px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }

        .gallery-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 50px;
            color: #2a2a2a;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .gallery-item {
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            height: 300px;
            background: #f5f5f5;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Lightbox - Final Robust Version */
        .lb-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: none;
            /* Controlled by JS */
            z-index: 999999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
            cursor: zoom-out;
        }

        .lb-overlay.active {
            display: flex;
        }

        .lb-image-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #lbMainImage {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            display: none;
            /* Hidden until loaded */
        }

        /* The Orange Close Button */
        .lb-close {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background: #FF6B35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: none;
            transition: transform 0.2s;
        }

        .lb-close:hover {
            transform: scale(1.1) rotate(90deg);
        }

        .lb-close::before,
        .lb-close::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 4px;
            background: white;
            border-radius: 2px;
        }

        .lb-close::before {
            transform: rotate(45deg);
        }

        .lb-close::after {
            transform: rotate(-45deg);
        }

        /* Loader Spinner */
        .lb-loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #FF6B35;
            border-radius: 50%;
            animation: lbSpin 0.8s linear infinite;
        }

        @keyframes lbSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .gallery-title {
                font-size: 2.2rem;
            }

            .lb-close {
                top: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }

            .lb-close::before,
            .lb-close::after {
                width: 18px;
            }
        }
    </style>
</head>

<body>

                        <li><a href="donate.html" class="nav-link">Donate</a></li>

                    </ul>
                </nav>

    <div class="gallery-container">
        <h1 class="gallery-title">Impact Gallery</h1>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="images/WhatsApp Image 2026-02-01 at 9.28.23 AM.jpeg"></div>
            <div class="gallery-item"><img src="images/WhatsApp Image 2026-02-01 at 9.35.56 AM.jpeg"></div>
            <div class="gallery-item"><img src="images/WhatsApp Image 2026-02-01 at 9.28.25 AM.jpeg"></div>
            <div class="gallery-item"><img src="images/WhatsApp Image 2026-02-01 at 9.28.26 AM.jpeg"></div>
            <div class="gallery-item"><img src="images/WhatsApp Image 2026-02-01 at 9.35.59 AM.jpeg"></div>
            <div class="gallery-item"><img src="images/campaign_1.jpg"></div>
            <div class="gallery-item"><img src="images/campaign_2.jpg"></div>
            <div class="gallery-item"><img src="images/cow_rescue.jpg"></div>
            <div class="gallery-item"><img src="images/dog_shelter.jpg"></div>
            <div class="gallery-item"><img src="images/WhatsApp Image 2026-02-01 at 9.35.57 AM.jpeg"></div>
            <div class="gallery-item"><img src="images/WhatsApp Image 2026-02-01 at 9.35.58 AM.jpeg"></div>

    <!-- Lightbox Structure -->
    <div id="customLightbox" class="lb-overlay">
        <button id="lbCloseBtn" class="lb-close"></button>
        <div id="lbLoader" class="lb-loader"></div>
        <div class="lb-image-container">
            <!-- No alt attribute here to prevent "undefined" text flicker -->
            <img id="lbMainImage" src="">
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Babyraj Foundation. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const overlay = document.getElementById('customLightbox');
        const mainImg = document.getElementById('lbMainImage');
        const loader = document.getElementById('lbLoader');
        const closeBtn = document.getElementById('lbCloseBtn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        function openImage(e) {
            const clickedImg = e.currentTarget.querySelector('img');
            if (!clickedImg) return;

            const targetSrc = clickedImg.src;

            // 1. Reset state - hide image, show loader
            mainImg.style.display = 'none';
            mainImg.src = '';
            loader.style.display = 'block';

            // 2. Show overlay
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            // 3. Preload image
            const preloader = new Image();
            preloader.onload = function () {
                mainImg.src = targetSrc;
                mainImg.style.display = 'block';
                loader.style.display = 'none';
            };
            preloader.onerror = function () {
                loader.style.display = 'none';
                console.error("Failed to load: " + targetSrc);
            };
            preloader.src = targetSrc;
        }

        function closeGallery() {
            // Hide overlay first
            overlay.classList.remove('active');
            document.body.style.overflow = 'auto';

            // Clean up image source AFTER it's hidden to avoid flicker
            setTimeout(() => {
                mainImg.src = '';
                mainImg.style.display = 'none';
            }, 100);
        }

        // Event listeners
        galleryItems.forEach(item => item.addEventListener('click', openImage));

        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeGallery();
        });

        overlay.addEventListener('click', (e) => {
            // Close if clicking the overlay background or image container
            if (e.target === overlay || e.target.classList.contains('lb-image-container')) {
                closeGallery();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closeGallery();
            }
        });
    </script>
</body>

</html>
